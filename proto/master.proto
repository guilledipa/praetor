syntax = "proto3";

package master;

option go_package = "github.com/guilledipa/praetor/proto/gen/master;master";

service ConfigurationMaster {
  // Requests the configuration catalog for the node.
  rpc GetCatalog(GetCatalogRequest) returns (GetCatalogResponse) {}
  
  // Reports the compliance state of the node back to the master.
  rpc ReportState(ReportStateRequest) returns (ReportStateResponse) {}
}

message GetCatalogRequest {
  // Node identifier, e.g., hostname or certificate CN.
  string node_id = 1;
  // Node facts, as key-value pairs.
  map<string, string> facts = 2;
}

message Catalog {
  // Raw catalog content (e.g., YAML or JSON string).
  string content = 1;
  // Format of the content (e.g., "yaml", "json").
  string format = 2;
}

message GetCatalogResponse {
  // The compiled catalog for the node.
  Catalog catalog = 1;
  // Digital signature of the catalog content.
  bytes signature = 2;
  // Algorithm used for signing (e.g., "ed25519").
  string signature_algorithm = 3;
}

message ResourceReport {
  string type = 1;
  string id = 2;
  bool compliant = 3;
  string message = 4;
}

message ReportStateRequest {
  // Node identifier
  string node_id = 1;
  // A structural array of resource enforcement reports
  repeated ResourceReport resources = 2;
  // Whether the node is fully compliant overall
  bool is_compliant = 3;
  // Unix timestamp of the report
  int64 timestamp = 4;
}

message ReportStateResponse {
  // Master acknowledges receipt
  bool acknowledged = 1;
}

service CertificateAuthority {
  // Requests a signed certificate using a CSR and Bootstrap Token
  rpc SignCSR(SignCSRRequest) returns (SignCSRResponse) {}
}

message SignCSRRequest {
  string node_id = 1;
  // A shared secret to authenticate the unprovisioned node
  string bootstrap_token = 2;
  // PEM encoded Certificate Signing Request
  string csr_pem = 3;
}

message SignCSRResponse {
  // PEM encoded signed certificate
  string certificate_pem = 1;
}

service Operator {
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse) {}
  rpc GetAgentStatus(AgentStatusRequest) returns (AgentStatusResponse) {}
  rpc TriggerSync(TriggerSyncRequest) returns (TriggerSyncResponse) {}
}

message ListAgentsRequest {}

message AgentSummary {
  string node_id = 1;
  bool is_compliant = 2;
  int64 last_reported_at = 3;
}

message ListAgentsResponse {
  repeated AgentSummary agents = 1;
}

message AgentStatusRequest {
  string node_id = 1;
}

message AgentStatusResponse {
  string node_id = 1;
  bool is_compliant = 2;
  int64 last_reported_at = 3;
  repeated ResourceReport resources = 4;
}

message TriggerSyncRequest {
  string node_id = 1;
}

message TriggerSyncResponse {
  bool success = 1;
  string message = 2;
}
