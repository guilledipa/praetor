name: Build Praetor Packages

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Debian Packages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install gRPC plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Compile Protobufs & Run Tests
        run: make all

      - name: Build Debian Packages
        run: make deb

      - name: Upload Artifacts (praetor-agent)
        uses: actions/upload-artifact@v4
        with:
          name: praetor-agent-deb
          path: build/praetor-agent_*.deb
          retention-days: 7

      - name: Upload Artifacts (praetor-plugin-linux)
        uses: actions/upload-artifact@v4
        with:
          name: praetor-plugin-linux-deb
          path: build/praetor-plugin-linux_*.deb
          retention-days: 7

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Master Image (Docker Hub)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: master/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/praetor-master:latest,${{ secrets.DOCKERHUB_USERNAME }}/praetor-master:${{ github.sha }}
