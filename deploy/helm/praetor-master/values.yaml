replicaCount: 1

image:
  repository: praetor-master
  pullPolicy: IfNotPresent
  tag: "latest"

nats:
  enabled: true
  nats:
    jetstream:
      enabled: true

triggerInterval: "15s"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

service:
  type: ClusterIP
  grpc: 50051
  admin: 50052
