apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-master
  labels:
    app: {{ .Release.Name }}-master
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.grpc }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    app: {{ .Release.Name }}-master
